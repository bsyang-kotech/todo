<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TODO — KOTECH SYSTEM</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f7f9fc;
      color: #1c2433;
      min-height: 100vh;
    }

    /* ── 헤더 ── */
    header {
      background: #0f2c59;
      padding: 18px 0;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(15,44,89,0.18);
    }
    .header-inner {
      max-width: 680px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .header-title {
      color: #ffffff;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }
    .header-title span {
      color: #7ea8d8;
      font-size: 13px;
      font-weight: 500;
      margin-left: 8px;
    }

    /* ── 메인 ── */
    main {
      max-width: 680px;
      margin: 0 auto;
      padding: 32px 24px 64px;
    }

    /* ── 입력 영역 ── */
    .input-card {
      background: #ffffff;
      border: 1px solid #e7ebf1;
      border-radius: 16px;
      padding: 20px 22px;
      box-shadow: 0 6px 20px rgba(15,44,89,0.06);
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }
    .input-card input[type="text"] {
      flex: 1;
      padding: 11px 16px;
      border: 1px solid #d9dee6;
      border-radius: 10px;
      font-family: inherit;
      font-size: 15px;
      color: #1c2433;
      outline: none;
      transition: border-color 0.15s;
    }
    .input-card input[type="text"]:focus {
      border-color: #0f2c59;
    }
    .input-card input[type="text"]::placeholder {
      color: #b0b8c4;
    }
    .btn-add {
      padding: 11px 22px;
      background: #0f2c59;
      color: #ffffff;
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.15s, box-shadow 0.15s;
      white-space: nowrap;
    }
    .btn-add:hover {
      background: #1a3f7a;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(15,44,89,0.18);
    }
    .btn-add:active {
      transform: translateY(0);
      box-shadow: none;
    }

    /* ── 필터 탭 ── */
    .filter-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .btn-filter {
      padding: 8px 18px;
      border: 1px solid #d9dee6;
      border-radius: 30px;
      background: #ffffff;
      color: #5a6472;
      font-family: inherit;
      font-size: 13.5px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-filter:hover {
      border-color: #0f2c59;
      color: #0f2c59;
    }
    .btn-filter.active {
      background: #0f2c59;
      border-color: #0f2c59;
      color: #ffffff;
      font-weight: 600;
    }

    /* ── 목록 ── */
    .todo-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 60px;
    }

    .todo-item {
      background: #ffffff;
      border: 1px solid #e7ebf1;
      border-radius: 12px;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 2px 8px rgba(15,44,89,0.04);
      animation: fadeIn 0.18s ease;
      transition: box-shadow 0.15s, transform 0.15s;
    }
    .todo-item:hover {
      box-shadow: 0 6px 20px rgba(15,44,89,0.09);
    }
    .todo-item.completed .todo-text {
      text-decoration: line-through;
      color: #b0b8c4;
    }
    .todo-item.removing {
      animation: fadeOut 0.18s ease forwards;
    }

    /* 커스텀 체크박스 */
    .todo-check {
      appearance: none;
      -webkit-appearance: none;
      width: 22px;
      height: 22px;
      border: 2px solid #d9dee6;
      border-radius: 6px;
      cursor: pointer;
      flex-shrink: 0;
      position: relative;
      transition: all 0.15s;
    }
    .todo-check:hover {
      border-color: #0f2c59;
    }
    .todo-check:checked {
      background: #0f2c59;
      border-color: #0f2c59;
    }
    .todo-check:checked::after {
      content: '';
      position: absolute;
      left: 4px;
      top: 1px;
      width: 6px;
      height: 11px;
      border: 2px solid #ffffff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg);
    }

    .todo-text {
      flex: 1;
      font-size: 15px;
      color: #1c2433;
      line-height: 1.45;
      word-break: break-all;
      transition: color 0.15s;
    }

    .btn-delete {
      background: none;
      border: none;
      color: #c0bfc4;
      font-size: 18px;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
      flex-shrink: 0;
      line-height: 1;
    }
    .btn-delete:hover {
      color: #c0392b;
      background: #fdf0ee;
    }

    /* ── 빈 상태 ── */
    .empty-state {
      text-align: center;
      padding: 48px 0 32px;
      color: #b0b8c4;
    }
    .empty-state .empty-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }
    .empty-state p {
      font-size: 15px;
    }

    /* ── 하단 요약 ── */
    .footer-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 20px;
      padding: 0 4px;
    }
    .footer-count {
      font-size: 13.5px;
      color: #8b94a3;
    }
    .footer-count strong {
      color: #0f2c59;
      font-weight: 700;
    }
    .btn-clear {
      background: none;
      border: none;
      color: #c0392b;
      font-family: inherit;
      font-size: 13.5px;
      font-weight: 500;
      cursor: pointer;
      padding: 4px 10px;
      border-radius: 6px;
      transition: background 0.15s;
    }
    .btn-clear:hover {
      background: #fdf0ee;
    }
    .btn-clear:disabled {
      color: #d9dee6;
      cursor: default;
    }
    .btn-clear:disabled:hover {
      background: none;
    }

    /* ── 애니메이션 ── */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeOut {
      from { opacity: 1; transform: translateY(0); }
      to   { opacity: 0; transform: translateY(-6px); }
    }

    /* ── 반응형 ── */
    @media (max-width: 768px) {
      main { padding: 20px 16px 48px; }
      .input-card { padding: 14px 16px; gap: 8px; }
      .btn-add { padding: 11px 16px; font-size: 14px; }
      .header-title span { display: none; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-title">
      ✅ TODO<span>KOTECH SYSTEM</span>
    </div>
  </div>
</header>

<main>
  <!-- 입력 -->
  <div class="input-card">
    <input type="text" id="todo-input" placeholder="새 할 일을 입력하세요..." maxlength="200">
    <button class="btn-add" onclick="handleAdd()">추가</button>
  </div>

  <!-- 필터 -->
  <div class="filter-bar">
    <button class="btn-filter active" data-filter="all" onclick="setFilter('all')">전체</button>
    <button class="btn-filter" data-filter="active" onclick="setFilter('active')">진행중</button>
    <button class="btn-filter" data-filter="completed" onclick="setFilter('completed')">완료</button>
  </div>

  <!-- 목록 -->
  <div class="todo-list" id="todo-list"></div>

  <!-- 하단 요약 -->
  <div class="footer-bar">
    <span class="footer-count" id="footer-count"></span>
    <button class="btn-clear" id="btn-clear" onclick="clearCompleted()">완료 항목 삭제</button>
  </div>
</main>

<script>
  let todos = [];
  let filter = 'all';

  function loadFromStorage() {
    try {
      const saved = localStorage.getItem('kotech-todos');
      if (saved) todos = JSON.parse(saved);
    } catch (e) {
      todos = [];
    }
  }

  function saveToStorage() {
    localStorage.setItem('kotech-todos', JSON.stringify(todos));
  }

  function addTodo(text) {
    todos.push({ id: Date.now(), text: text.trim(), completed: false });
    saveToStorage();
  }

  function toggleTodo(id) {
    const todo = todos.find(t => t.id === id);
    if (todo) todo.completed = !todo.completed;
    saveToStorage();
    render();
  }

  function deleteTodo(id) {
    const el = document.querySelector(`[data-id="${id}"]`);
    if (el) {
      el.classList.add('removing');
      el.addEventListener('animationend', () => {
        todos = todos.filter(t => t.id !== id);
        saveToStorage();
        render();
      }, { once: true });
    }
  }

  function clearCompleted() {
    todos = todos.filter(t => !t.completed);
    saveToStorage();
    render();
  }

  function setFilter(type) {
    filter = type;
    document.querySelectorAll('.btn-filter').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.filter === type);
    });
    render();
  }

  function filteredTodos() {
    if (filter === 'active') return todos.filter(t => !t.completed);
    if (filter === 'completed') return todos.filter(t => t.completed);
    return todos;
  }

  function render() {
    const list = document.getElementById('todo-list');
    const items = filteredTodos();

    if (items.length === 0) {
      const messages = {
        all: '할 일을 추가해 보세요!',
        active: '진행중인 항목이 없습니다.',
        completed: '완료된 항목이 없습니다.'
      };
      list.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📋</div>
          <p>${messages[filter]}</p>
        </div>`;
    } else {
      list.innerHTML = items.map(todo => `
        <div class="todo-item${todo.completed ? ' completed' : ''}" data-id="${todo.id}">
          <input type="checkbox" class="todo-check"
            ${todo.completed ? 'checked' : ''}
            onchange="toggleTodo(${todo.id})">
          <span class="todo-text">${escapeHtml(todo.text)}</span>
          <button class="btn-delete" onclick="deleteTodo(${todo.id})" title="삭제">✕</button>
        </div>`).join('');
    }

    const activeCount = todos.filter(t => !t.completed).length;
    const completedCount = todos.filter(t => t.completed).length;
    const countEl = document.getElementById('footer-count');
    countEl.innerHTML = todos.length === 0
      ? ''
      : `남은 항목 <strong>${activeCount}</strong>개 · 완료 ${completedCount}개`;

    const clearBtn = document.getElementById('btn-clear');
    clearBtn.disabled = completedCount === 0;
  }

  function handleAdd() {
    const input = document.getElementById('todo-input');
    const text = input.value.trim();
    if (!text) {
      input.focus();
      return;
    }
    addTodo(text);
    input.value = '';
    input.focus();
    if (filter === 'completed') setFilter('all');
    else render();
  }

  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  document.getElementById('todo-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') handleAdd();
  });

  loadFromStorage();
  render();
</script>
</body>
</html>
